# ==============================================================================
# BASE CONFIGURATION
# ==============================================================================
baseURL = "https://example.com/"
title = "Theme X"
languageCode = "en-us"
theme = "theme-x"
summaryLength = 30

[pagination]
  pagerSize = 3

# Enable output formats required for Search (FR-04) and RSS (FR-25)
[outputs]
  home =["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

# ==============================================================================
# TAXONOMIES (Resolves IA Sec 10 & 16)
# ==============================================================================
# Mapping Authors as taxonomies allows Hugo to natively handle 
# routing, lists, and metadata via "_index.md" files in their respective folders.
[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

# ==============================================================================
# MARKDOWN & RICH CONTENT (FR-09)
# ==============================================================================
[markup.goldmark.renderer]
  unsafe = true # Required to render raw HTML for embedded media/complex tables
[markup.goldmark.extensions]
  linkify = true
  footnotes = true
  typographer = true
[markup.highlight]
  codeFences = true
  guessSyntax = true
  # lineNos = true
  noClasses = false # Allows theme to style code blocks via CSS variables for Dark/Light mode

# ==============================================================================
# THEME PARAMETERS / MODULE TOGGLES (FR-34 & FR-35)
# ==============================================================================
[params]
  description = " A modern, content-first Hugo theme for editorial, technical, and article-driven websites. Focused on the structural principles of longevity."
  
  # Identity & Trust (FR-21)
  dateFormat = "Jan 2, 2006"
  showUpdatedDate = true
  
  # Platform Basics (FR-29)
  defaultTheme = "system" # Options: "light", "dark", "system"

  # --------------------------------------------------------------------------
  # Reusable Module Toggles (M-01 to M-17)
  # --------------------------------------------------------------------------
  
  # Reading Experience (FR-12)
  enableReadingTime = true
  enableTOC = true
  enableReadingProgress = true
  enableBackToTop = true
  
  # Exploration (FR-14, FR-15, FR-16)
  enableRelatedPosts = true
  enablePreviousNext = true
  enableSeriesNavigation = true
  enableAuthorBlock = true 

  # Engagement (FR-24, FR-26, FR-28)
  enableComments = false   # Set to true to load external comment system partial
  enableSharing = true
  enableNewsletter = true
  enableSearch = true

  # --------------------------------------------------------------------------
  # Specific Feature Configurations
  # --------------------------------------------------------------------------
  [params.archive]
    groupBy = "year"       # Options: "year", "year-month"

  [params.widgets]
    categoriesLimit = 10
    tagsLimit = 15

  [params.search]
    maxResults = 2         # Default number of search results per page to display
    categoriesLimit = 5
    tagsLimit = 4
  
  # --- Newsletter Configuration ---
  [params.newsletter]
  # Put your Formspree, Mailchimp, or ConvertKit action URL here
  action = "https://formspree.io/f/your-form-id" 

  # --- Social Links Array ---
  [[params.socials]]
  name = "LinkedIn"
  url = "https://linkedin.com/in/yourprofile"
  icon = "linkedin" # Maps to svg/linkedin.html

  [[params.socials]]
  name = "X"
  url = "https://x.com/yourprofile"
  icon = "x-twitter" # Maps to svg/x-twitter.html

  [[params.socials]]
  name = "Mastodon"
  url = "https://mastodon.social/@yourprofile"
  icon = "mastodon" # Maps to svg/mastodon.html

  # --- Main Navigation (with SVG icons) ---
  [menus]
  [[menus.main]]
    name = "Authors"
    url = "/authors/"
    weight = 10
    [menus.main.params]
      icon = "person" # Maps to svg/person.html (which you already have!)

  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 20
    [menus.main.params]
      icon = "info"

  [[menus.main]]
    name = "Archives"
    url = "/archives/"
    weight = 30
    [menus.main.params]
      icon = "archive"

  [[menus.main]]
    name = "Categories"
    url = "/categories/"
    weight = 40
    [menus.main.params]
      icon = "categories" # You will need an svg/category.html

  [[menus.main]]
    name = "Tags"
    url = "/tags/"
    weight = 50
    [menus.main.params]
      icon = "tags"
